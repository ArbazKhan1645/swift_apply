name: swift_apply
description: "The ultimate open-source Flutter tool for automated job applications. Features 'Magic Fill' clipboard intelligence, dual-mode outreach (SMTP/WhatsApp Business API), and a premium Glassmorphism UI. Streamline your job hunt in seconds! 🚀"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: any
  mailer: ^6.0.1
  url_launcher: ^6.2.1
  google_fonts: ^6.2.1
  share_plus: ^9.0.0
  provider: ^6.1.1
  go_router: ^14.0.0
  get_it: ^7.7.0
  injectable: ^2.5.0
  file_picker: ^8.0.0
  receive_sharing_intent: ^1.6.1
  http: ^1.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.6.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
